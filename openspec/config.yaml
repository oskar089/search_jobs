schema: spec-driven

context: |
  Project: search_jobs
  Description: Automatic job search app — scrapes job portals, matches profile, auto-applies, generates AI cover letters
  Repository: https://github.com/oskar089/search_jobs
  Stack: Python 3.12+ / FastAPI / SQLAlchemy async / Alembic / Celery + Redis / Playwright
  Architecture: Python backend (FastAPI) + decoupled React/Vite frontend
  Testing: pytest + pytest-asyncio (not yet configured)
  Style: ruff (lint + format), mypy (type checking)

testing:
  strict_tdd: false
  reason: No test runner, config, or dependency files found. Project is in initial empty state.
  runner: null
  layers:
    unit: { available: false, tool: null }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage: { available: false, command: null }
  quality:
    linter: { available: false, command: null }
    type_checker: { available: false, command: null }
    formatter: { available: false, command: null }

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
