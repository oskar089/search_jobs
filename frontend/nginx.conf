server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------
    # Prevent clickjacking
    add_header X-Frame-Options DENY always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options nosniff always;

    # HSTS — enforce HTTPS for one year (including subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy — restrict resources to same-origin + known CDNs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' http://localhost:8000; frame-ancestors 'none';" always;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # SPA fallback — send all non-file routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
